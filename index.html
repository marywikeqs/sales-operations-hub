<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Quilt · Sales Operations Hub</title>
<style>
:root{
  --bg:#f4f5fb; --bg2:#eceefb; --panel:#ffffff; --ink:#161829; --muted:#6b6f8a;
  --line:#e9eaf5; --brand:#5b4be6; --brand-2:#8b5cf6; --good:#0d9a6a; --chip:#eef0fb;
  --card-shadow:0 1px 2px rgba(20,22,50,.05),0 10px 30px rgba(20,22,50,.07);
}
html[data-theme="dark"]{
  --bg:#0b0d1a; --bg2:#111427; --panel:#161a2e; --ink:#eef0fb; --muted:#9aa0c4;
  --line:#262b45; --brand:#8b7bff; --brand-2:#a78bfa; --good:#34d399; --chip:#20253d;
  --card-shadow:0 1px 2px rgba(0,0,0,.4),0 14px 40px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
body{margin:0;color:var(--ink);-webkit-font-smoothing:antialiased;
  font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;
  background:
    radial-gradient(900px 500px at 12% -8%, color-mix(in srgb,var(--brand) 16%,transparent), transparent 60%),
    radial-gradient(800px 500px at 108% 4%, color-mix(in srgb,var(--brand-2) 15%,transparent), transparent 55%),
    linear-gradient(180deg,var(--bg2),var(--bg));
  background-attachment:fixed;min-height:100vh}
.wrap{max-width:1180px;margin:0 auto;padding:30px 22px 80px}
/* header */
.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:22px}
.brandline{display:flex;align-items:center;gap:13px}
.logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--brand),var(--brand-2));
  display:grid;place-items:center;box-shadow:0 6px 16px color-mix(in srgb,var(--brand) 38%,transparent)}
.logo svg{width:24px;height:24px}
h1{margin:0;font-size:23px;font-weight:800;letter-spacing:-.5px}
.brandline p{margin:2px 0 0;font-size:13px;color:var(--muted);font-weight:500}
.theme{border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:10px;
  padding:9px 13px;cursor:pointer;font-size:13px;display:flex;gap:7px;align-items:center;transition:.15s}
.theme:hover{color:var(--ink)}
.search{position:relative;margin-bottom:30px}
.search input{width:100%;padding:13px 15px 13px 42px;border:1px solid var(--line);border-radius:13px;font-size:14.5px;
  font-family:inherit;background:var(--panel);color:var(--ink);box-shadow:var(--card-shadow)}
.search input::placeholder{color:var(--muted)}
.search input:focus{outline:2px solid var(--brand);outline-offset:1px;border-color:var(--brand)}
.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--muted)}
/* sections */
.section{margin-bottom:34px}
.section h2{font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
  margin:0 0 15px;font-weight:800;display:flex;align-items:center;gap:9px}
.section h2 .dot{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2))}
.section h2 .n{font-weight:700;color:var(--muted);opacity:.6;letter-spacing:0}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:17px}
.card{position:relative;display:flex;gap:15px;align-items:flex-start;background:var(--panel);
  border:1px solid var(--line);border-radius:18px;padding:19px 20px;box-shadow:var(--card-shadow);
  text-decoration:none;color:inherit;transition:transform .16s cubic-bezier(.2,.7,.3,1),box-shadow .16s,border-color .16s}
a.card:hover{transform:translateY(-4px);border-color:color-mix(in srgb,var(--accent) 55%,var(--line));
  box-shadow:0 4px 12px rgba(20,22,50,.06),0 18px 40px color-mix(in srgb,var(--accent) 26%,transparent)}
.card .ic{flex:0 0 46px;width:46px;height:46px;border-radius:13px;display:grid;place-items:center;color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 6px 16px color-mix(in srgb,var(--accent) 40%,transparent)}
.card .ic svg{width:24px;height:24px}
.card .body{min-width:0}
.card .name{font-weight:750;font-size:15.5px;letter-spacing:-.1px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card .desc{font-size:13.2px;color:var(--muted);margin-top:5px}
.card .host{font-size:11.5px;color:var(--muted);margin-top:10px;font-weight:600;opacity:.85}
.card .go{position:absolute;top:16px;right:16px;color:var(--accent);opacity:0;transform:translate(-4px,4px);
  transition:.18s;font-size:15px}
a.card:hover .go{opacity:1;transform:translate(0,0)}
.chip{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:999px}
.chip.live{background:color-mix(in srgb,var(--good) 16%,transparent);color:var(--good)}
.chip.soon{background:var(--chip);color:var(--muted)}
.card.pending{opacity:.7;cursor:default;box-shadow:none;background:transparent;border-style:dashed}
.card.pending .ic{background:var(--chip);color:var(--muted);box-shadow:none}
.empty{color:var(--muted);font-size:14px;padding:26px;text-align:center;border:1px dashed var(--line);border-radius:16px;background:var(--panel)}
footer{margin-top:22px;color:var(--muted);font-size:12px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brandline">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none"><path d="M4 8h16M4 12h16M4 16h16" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><circle cx="8" cy="8" r="1.6" fill="#fff"/><circle cx="15" cy="16" r="1.6" fill="#fff"/></svg></div>
      <div><h1>Sales Operations Hub</h1><p>Quilt Software · tools, dashboards &amp; playbooks in one place</p></div>
    </div>
    <button class="theme" id="themeBtn">🌙 <span>Dark</span></button>
  </div>
  <div class="search">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    <input type="text" id="search" placeholder="Search tools, dashboards, docs…" autocomplete="off">
  </div>

  <div id="sections"></div>

  <footer>Quilt Software · Sales Operations Hub — internal · <span id="count"></span></footer>
</div>

<script>
const ICONS = {
  calculator:'<path d="M6 2h12a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.8"/><path d="M8 6h8M8 10h.01M12 10h.01M16 10h.01M8 14h.01M12 14h.01M16 14v4M8 18h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>',
  chart:'<path d="M4 20V6M10 20V10M16 20V4M22 20H2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>',
  doc:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M14 2v6h6M8 13h8M8 17h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>',
  book:'<path d="M4 5a2 2 0 0 1 2-2h13v16H6a2 2 0 0 0-2 2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M4 19a2 2 0 0 0 2 2h13" stroke="currentColor" stroke-width="1.8"/>',
  tag:'<path d="M3 12V5a2 2 0 0 1 2-2h7l9 9-9 9z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><circle cx="8" cy="8" r="1.6" fill="currentColor"/>',
  flag:'<path d="M5 21V4m0 0 6 2 8-2v11l-8 2-6-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'
};

// section accent gradients (accent, accent2)
const ACCENTS = [ ['#5b4be6','#8b5cf6'], ['#0ea5b7','#22c1d6'], ['#e08a1e','#f5b301'], ['#e0457b','#f472b6'] ];

const SECTIONS = [
  { title:'Tools', items:[
    { name:'Payments Pricing Calculator', desc:'Estimate MRR, take rate & net margin for a merchant deal.', url:'https://quiltpaymentscalculator.netlify.app/', icon:'calculator', status:'live' },
  ]},
  { title:'Dashboards', items:[
    { name:'Salesforce Projects Dashboard', desc:'Sprint progress, team capacity & project states.', url:'https://cx.quiltteam.com/sfdc-shortcut', icon:'chart', status:'live' },
  ]},
  { title:'Playbooks & Docs', items:[
    { name:'Pricing Guidelines', desc:'Rate cards, discount bands & approval thresholds.', url:'', icon:'tag' },
    { name:'Sales Process & Deal Stages', desc:'Stage definitions, exit criteria & handoffs.', url:'', icon:'flag' },
    { name:'Discounting & Approvals', desc:'Who can approve what, and how to request it.', url:'', icon:'doc' },
    { name:'Onboarding & Ramp', desc:'New-hire ramp plan and enablement resources.', url:'', icon:'book' },
  ]},
];

function hostOf(url){ try{ return new URL(url).hostname.replace(/^www\./,''); }catch{ return ''; } }
function svg(name){ return '<svg viewBox="0 0 24 24" fill="none">'+(ICONS[name]||ICONS.doc)+'</svg>'; }

function cardHTML(it){
  const chip = it.status==='live' ? '<span class="chip live">Live</span>'
             : it.url ? '' : '<span class="chip soon">Link pending</span>';
  const inner =
    '<div class="ic">'+svg(it.icon)+'</div>'+
    '<div class="body"><div class="name">'+it.name+' '+chip+'</div>'+
    '<div class="desc">'+it.desc+'</div>'+
    (it.url ? '<div class="host">'+hostOf(it.url)+'</div>' : '<div class="host">Send me the link and I\'ll wire it up</div>')+
    '</div>';
  return it.url
    ? '<a class="card" href="'+it.url+'" target="_blank" rel="noopener"><span class="go">↗</span>'+inner+'</a>'
    : '<div class="card pending">'+inner+'</div>';
}

function render(q){
  q=(q||'').trim().toLowerCase();
  const root=document.getElementById('sections'); root.innerHTML='';
  let shown=0;
  SECTIONS.forEach((sec,i)=>{
    const items=sec.items.filter(it=> !q || (it.name+' '+it.desc).toLowerCase().includes(q));
    if(!items.length) return;
    shown+=items.length;
    const acc=ACCENTS[i%ACCENTS.length];
    const s=document.createElement('div'); s.className='section';
    s.style.setProperty('--accent',acc[0]); s.style.setProperty('--accent2',acc[1]);
    s.innerHTML='<h2><span class="dot"></span>'+sec.title+' <span class="n">'+items.length+'</span></h2>'+
                '<div class="cards">'+items.map(cardHTML).join('')+'</div>';
    root.appendChild(s);
  });
  if(!shown){ root.innerHTML='<div class="empty">No matches for “'+q+'”.</div>'; }
  const total=SECTIONS.reduce((n,s)=>n+s.items.length,0);
  document.getElementById('count').textContent = total+' resources';
}

document.getElementById('search').addEventListener('input',e=>render(e.target.value));
document.getElementById('themeBtn').addEventListener('click',()=>{
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',dark?'light':'dark');
  document.getElementById('themeBtn').innerHTML = dark?'🌙 <span>Dark</span>':'☀️ <span>Light</span>';
});
render('');
</script>
</body>
</html>
